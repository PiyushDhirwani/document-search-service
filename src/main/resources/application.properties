spring.application.name=document-search-service
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/document_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Cache
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Rate Limiting (requests per minute per tenant)
app.rate-limit.requests-per-minute=100

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.documentService.sliding-window-size=10
resilience4j.circuitbreaker.instances.documentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.documentService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.documentService.permitted-number-of-calls-in-half-open-state=3
